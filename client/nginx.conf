server {
    listen 80;
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
    # location /api {
    #     proxy_pass http://backend:8000;
    # }
}
# proxy pass is commented to deploy on render, uncomment and change backend to your backend service name if you want to deploy on docker-compose or locally.